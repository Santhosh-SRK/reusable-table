<div class="document-upload-container m-4">

 <app-reusable-table
  [data]="tableData"
  [columns]="columns"
  [enableInlineEdit]="true"
    [showActionColumn]="true"
  [enableAdd]="true"
  [enableDelete]="true"
  [enableExport]="true"
  [enableRowSelection]="true"
  [enablePrint]="true"
  (events)="handleTableEvents($event)" >
</app-reusable-table>
</div>
